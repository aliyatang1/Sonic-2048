<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sonic 2048</title>
    <link rel="stylesheet" href="./src/ui.css">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Sonic 2048</h1>
        <div class="controls">
          <button id="newGame">New Game</button>
          <button id="toggleSynth">Synth: FM</button>
          <button id="toggleAudio">Audio: On</button>
          <div id="playbackIndicator" class="playback" aria-hidden="true">Playback: Off</div>
          <div class="score">Score: <span id="score">0</span></div>
        </div>
      </header>

      <main>
        <div id="grid" class="grid"></div>
        <section id="recapPanel" class="recap-panel" aria-live="polite" hidden>
          <div class="recap-topline">
            <h2>Final Score</h2>
            <div id="recapScore" class="recap-score">0</div>
          </div>
          <p id="recapStatus" class="recap-status">Playback is ready.</p>
          <div class="recap-stats">
            <div class="recap-stat">
              <span class="label">Moves</span>
              <span id="recapMoves" class="value">0</span>
            </div>
            <div class="recap-stat">
              <span class="label">Top Tile</span>
              <span id="recapTopTile" class="value">0</span>
            </div>
          </div>
          <div class="recap-current">
            <span class="label">Current Phrase</span>
            <span id="recapCurrentMove" class="value">Waiting to replay.</span>
          </div>
          <div class="recap-actions">
            <button id="replayRecap">Replay Score</button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/ui.js"></script>
  </body>
</html>
